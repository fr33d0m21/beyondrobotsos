<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.4.0/socket.io.js"></script>
</head>
<body>
    <header>
        <h1>{{ app_name }}</h1>
        <p>Operator Console</p>
    </header>
    <main>
        <section class="panel">
            <h2>New Task</h2>
            <label for="intent">Intent</label>
            <textarea id="intent" placeholder="Example: Spawn an OpenClaw coding agent and prepare a Cursor cloud job for onboarding docs."></textarea>
            <label for="user-id">User ID</label>
            <input id="user-id" value="default-user">
            <button id="submit-task">Submit Task</button>
            <pre id="submit-result"></pre>
        </section>

        <section class="panel">
            <h2>Pending Approvals</h2>
            <div id="approvals"></div>
        </section>

        <section class="panel">
            <h2>Task Queue</h2>
            <pre id="tasks"></pre>
        </section>

        <section class="panel">
            <h2>Memory Timeline</h2>
            <pre id="memory"></pre>
        </section>
    </main>

    <script>
        async function fetchState() {
            const res = await fetch("/api/state");
            return await res.json();
        }

        function jsonPretty(value) {
            return JSON.stringify(value, null, 2);
        }

        function renderApprovals(approvals) {
            const container = document.getElementById("approvals");
            container.innerHTML = "";
            const entries = Object.entries(approvals || {});
            if (!entries.length) {
                container.textContent = "No pending approvals.";
                return;
            }
            entries.forEach(([taskId, value]) => {
                const wrap = document.createElement("div");
                wrap.className = "approval-card";
                const summary = document.createElement("pre");
                summary.textContent = jsonPretty(value);
                const approve = document.createElement("button");
                approve.textContent = "Approve";
                approve.onclick = async () => {
                    await fetch(`/api/approvals/${taskId}/resolve`, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({approved: true})
                    });
                };
                const reject = document.createElement("button");
                reject.textContent = "Reject";
                reject.onclick = async () => {
                    await fetch(`/api/approvals/${taskId}/resolve`, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({approved: false})
                    });
                };
                wrap.appendChild(summary);
                wrap.appendChild(approve);
                wrap.appendChild(reject);
                container.appendChild(wrap);
            });
        }

        async function refresh() {
            const state = await fetchState();
            document.getElementById("tasks").textContent = jsonPretty(state.tasks || {});
            document.getElementById("memory").textContent = jsonPretty(state.memory || {});
            renderApprovals(state.approvals || {});
        }

        document.getElementById("submit-task").onclick = async () => {
            const payload = {
                intent: document.getElementById("intent").value,
                user_id: document.getElementById("user-id").value
            };
            const res = await fetch("/api/tasks", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            const body = await res.json();
            document.getElementById("submit-result").textContent = jsonPretty(body);
            await refresh();
        };

        const socket = io();
        socket.on("update", function(data) {
            document.getElementById("tasks").textContent = jsonPretty(data.tasks || {});
            document.getElementById("memory").textContent = jsonPretty(data.memory || {});
            renderApprovals(data.approvals || {});
        });

        refresh();
        setInterval(refresh, 4000);
    </script>
</body>
</html>
